name: Build Signed AAB

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download AAB from Median
        run: |
          curl -L "https://median.co/app/qf1kd47evf0fj43n3kb25r5600/download/aab" -o app.aab

      - name: Sign AAB
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 -d > keystore.jks
          jarsigner -verbose \
            -sigalg SHA256withRSA \
            -digestalg SHA-256 \
            -keystore keystore.jks \
            -storepass "${{ secrets.KEY_STORE_PASSWORD }}" \
            -keypass "${{ secrets.KEY_PASSWORD }}" \
            app.aab \
            "${{ secrets.KEY_ALIAS }}"

      - name: Upload signed AAB
        uses: actions/upload-artifact@v4
        with:
          name: signed-aab
          path: app.aab
